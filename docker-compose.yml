version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: supplychain-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supplychain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: supplychain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: supplychain-api
    environment:
      DEBUG: "true"
      DJANGO_SECRET_KEY: django-insecure-change-this-in-production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: supplychain
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
    command: python manage.py runserver 0.0.0.0:8000

  # Celery Worker for async tasks
  celery-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: supplychain-celery-worker
    environment:
      DEBUG: "true"
      DJANGO_SECRET_KEY: django-insecure-change-this-in-production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: supplychain
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - api
      - redis
    volumes:
      - ./server:/app
    command: celery -A config worker -l info

  # Celery Beat for scheduled tasks
  celery-beat:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: supplychain-celery-beat
    environment:
      DEBUG: "true"
      DJANGO_SECRET_KEY: django-insecure-change-this-in-production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: supplychain
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - api
      - redis
    volumes:
      - ./server:/app
    command: celery -A config beat -l info

  # Vue.js Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: supplychain-client
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
